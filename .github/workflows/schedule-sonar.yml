# This workflow trigger a full Sonar analysis at regular interval
# Github actions command reference: https://docs.github.com/en/actions/learn-github-actions/workflow-syntax-for-github-actions
name: Sonar Analysis - Scheduled

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1,3,5' # At 4AM, on Monday, Wednesday and Friday

env:
  MODULE_ID: augmented-search-custom-configur

jobs:
  sonar-analysis:
    name: Sonar Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
         supported_branches: ["${{ github.event.repository.default_branch }}"]
    container:
      image: ghcr.io/jahia/jahia-docker-mvn-cache:17-jdk-noble-mvn-loaded
      credentials:
        username: ${{ secrets.GH_PACKAGES_USERNAME }}
        password: ${{ secrets.GH_PACKAGES_TOKEN }}
    steps:
      - name: Setup env variables
        id: vars
        shell: bash
        run: |
          SAFE_BRANCH=$(echo "${{ matrix.supported_branches }}" | tr '/ ' '_')
          echo "suffix=-${SAFE_BRANCH}" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.supported_branches }}
      - uses: jahia/jahia-modules-action/build@v2
        with:
          github_artifact_suffix: ${{ steps.vars.outputs.suffix }}
          nexus_username: ${{ secrets.NEXUS_USERNAME }}
          nexus_password: ${{ secrets.NEXUS_PASSWORD }}
          mvn_settings_filepath: '.github/maven.settings.xml'
      - uses: jahia/jahia-modules-action/sonar-analysis@v2
        with:
          primary_release_branch: ${{ matrix.supported_branches }}
          build_artifacts: build-artifacts${{ steps.vars.outputs.suffix }}
          github_pr_id: ${{github.event.number}}
          sonar_url: ${{ secrets.SONAR_URL }}
          sonar_token: ${{ secrets.SONAR_TOKEN }}
          nvd_apikey: ${{ secrets.NVD_APIKEY }}
          mvn_settings_filepath: '.github/maven.settings.xml'
